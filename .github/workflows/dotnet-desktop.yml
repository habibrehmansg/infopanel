# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: 
      - main
      - master
    tags: '*'
  pull_request:
    branches: '**'
  workflow_dispatch:  # Allow manual triggering

jobs:
  build:
    runs-on: windows-2022

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
        cache: true
        cache-dependency-path: '**/packages.lock.json'

    # Cache NuGet packages
    # - name: Cache NuGet packages
    #   uses: actions/cache@v4
    #   with:
    #     path: ~/.nuget/packages
    #     key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}-${{ matrix.targetFramework }}
    #     restore-keys: |
    #       ${{ runner.os }}-nuget-

    - name: Build InfoPanel
      run: |
        dotnet restore --force-evaluate
        dotnet publish InfoPanel/InfoPanel.csproj -c Release -r win-x64 --self-contained -p:PublishProfile=FolderProfile -p:Platform=x64

    - name: Install and Compile Inno Setup Installer
      shell: powershell
      run: |
        cd ${{ github.workspace }}\InnoSetup
        iscc "setup.iss"      

    - name: Upload Artifact Setup
      uses: actions/upload-artifact@v4
      with:
        name: InfoPanel-Setup-${{ github.sha }}
        path: "${{ github.workspace }}/InnoSetup/Output/InfoPanelSetup.exe"
        retention-days: 90

    ###################################
    # Everything below is only for tagged Releases
    ###################################
    - name: Generate Release Notes
      if: startsWith(github.ref, 'refs/tags/')
      shell: bash
      run: |
        TAG="${GITHUB_REF#refs/tags/}"
        RESPONSE=$(curl -sf --max-time 120 -X POST \
          "https://api.infopanel.net/v1/github/releases/${TAG}/notes" \
          -H "Authorization: Bearer ${{ secrets.INFOPANEL_GH_ACTIONS_SECRET }}" \
          -H "Content-Type: application/json") || true

        if [ -n "$RESPONSE" ]; then
          echo "$RESPONSE" | jq -r '.notes' > release_notes.md
          echo "Generated release notes:"
          cat release_notes.md
        else
          echo "::warning::Release notes generation failed, using GitHub default"
          echo "" > release_notes.md
        fi

    - name: Upload Release Asset
      if: startsWith(github.ref, 'refs/tags/')
      id: upload-release-asset
      uses: ncipollo/release-action@v1
      with:
        artifacts: ${{ github.workspace }}/InnoSetup/Output/InfoPanelSetup.exe
        bodyFile: release_notes.md
        generateReleaseNotes: false
        allowUpdates: true
        draft: false
        prerelease: false